<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        font-family: 'Inter', sans-serif;
        background-image: radial-gradient(#1e1e1e 1px, transparent 1px),
          radial-gradient(#1e1e1e 1px, transparent 1px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
      }
      .glow {
        box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
      }
      .pulsate {
        animation: pulsate 1.5s infinite;
      }
      @keyframes pulsate {
        0% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 25px rgba(192, 132, 252, 0.6);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="text/babel">
      const { useState } = React;
      
      // Mengambil komponen dari window.Recharts
      const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts;

      const App = () => {
        const [activeTab, setActiveTab] = useState('Tracker');

        const habits = [
          { name: 'Ga tdur pagi', color: '#f87171', score: 90, trend: 'up' },
          { name: 'Olahraga', color: '#34d399', score: 80, trend: 'down' },
          { name: 'Meditasi', color: '#f472b6', score: 95, trend: 'up' },
        ];

        const dailyProgress = [
          { day: 1, score: 7 },
          { day: 2, score: 8 },
          { day: 3, score: 6 },
          { day: 4, score: 9 },
          { day: 5, score: 7 },
        ];

        return (
          // Tambahkan pb-24 agar bagian bawah tidak tertutup navigasi
          <div className="max-w-md mx-auto text-white pb-24 relative min-h-screen">
            
            {/* Header */}
            <header className="flex justify-between items-center p-4">
              <button className="text-purple-400 hover:glow transition-all">
                ←
              </button>
              <h1 className="text-xl font-bold">Habit Tracker</h1>
              <div className="flex space-x-2">
                <button className="text-purple-400 hover:glow transition-all">
                  ✎
                </button>
                <button className="text-purple-400 hover:glow transition-all">
                  📖
                </button>
                <button className="text-purple-400 hover:glow transition-all">
                  +
                </button>
              </div>
            </header>

            <div className="px-4">
              {/* Quote */}
              <div className="bg-[#1e1e1e] rounded-3xl p-4 my-4">
                <p className="italic text-center text-gray-300 text-sm">
                  "Skip hari ini? Lo baru aja kasih tau otak lo bahwa lo gak serius."
                </p>
              </div>

              {/* Tabs */}
              <div className="flex justify-center space-x-4 my-4">
                <button
                  className={`px-6 py-2 rounded-full font-semibold transition-all ${
                    activeTab === 'Tracker'
                      ? 'bg-purple-400 text-black shadow-[0_0_15px_rgba(192,132,252,0.4)]'
                      : 'bg-[#1e1e1e] text-gray-400'
                  }`}
                  onClick={() => setActiveTab('Tracker')}
                >
                  Tracker
                </button>
                <button
                  className={`px-6 py-2 rounded-full font-semibold transition-all ${
                    activeTab === 'Analisis'
                      ? 'bg-purple-400 text-black shadow-[0_0_15px_rgba(192,132,252,0.4)]'
                      : 'bg-[#1e1e1e] text-gray-400'
                  }`}
                  onClick={() => setActiveTab('Analisis')}
                >
                  Analisis
                </button>
              </div>

              {/* Month Selector */}
              <div className="flex justify-between items-center bg-[#1e1e1e] rounded-2xl p-4 my-4">
                <button className="text-purple-400 hover:glow transition-all font-bold">
                  &lt;
                </button>
                <span className="font-bold">Maret 2026</span>
                <button className="text-purple-400 hover:glow transition-all font-bold">
                  &gt;
                </button>
              </div>

              {/* Info Card */}
              <div className="bg-[#1e1e1e] rounded-3xl p-4 my-4">
                <h2 className="text-md font-bold mb-1">
                  Protokol 21 Hari (Huberman) 🧠
                </h2>
                <p className="text-xs text-gray-400">
                  Latihan kebiasaan untuk membangun disiplin dan konsistensi.
                </p>
              </div>

              {/* 4-Grid Stats */}
              <div className="grid grid-cols-2 gap-4 my-4">
                <div className="bg-[#1e1e1e] rounded-3xl p-4">
                  <h3 className="text-xs font-bold text-gray-400 mb-1">Streak Terbaik</h3>
                  <p className="text-xl font-bold">15 Hari</p>
                </div>
                <div className="bg-[#1e1e1e] rounded-3xl p-4">
                  <h3 className="text-xs font-bold text-gray-400 mb-1">21-Day Locked</h3>
                  <p className="text-xl font-bold text-purple-400">✔</p>
                </div>
                <div className="bg-[#1e1e1e] rounded-3xl p-4">
                  <h3 className="text-xs font-bold text-gray-400 mb-1">Skor Hari Ini</h3>
                  <p className="text-xl font-bold">8/10</p>
                </div>
                <div className="bg-[#1e1e1e] rounded-3xl p-4">
                  <h3 className="text-xs font-bold text-gray-400 mb-1">Rate Bulanan</h3>
                  <p className="text-xl font-bold">85%</p>
                </div>
              </div>

              {/* Rate Bulanan Section */}
              <div className="my-6">
                <h3 className="text-md font-bold mb-3 flex items-center gap-2">
                  <span className="text-purple-400">📈</span> Rate Bulanan
                </h3>
                <div className="bg-[#1e1e1e] rounded-3xl p-4">
                  {habits.map((habit) => (
                    <div
                      key={habit.name}
                      className="flex items-center justify-between my-3"
                    >
                      <div className="flex items-center">
                        <span
                          className="w-3 h-3 rounded-full"
                          style={{ backgroundColor: habit.color }}
                        ></span>
                        <span className="ml-3 text-sm font-medium">{habit.name}</span>
                      </div>
                      <div className="flex items-center text-sm font-medium">
                        <span className="text-gray-400 mr-2">{habit.score}%</span>
                        <span
                          className={`flex items-center gap-1 ${
                            habit.trend === 'up' ? 'text-green-400' : 'text-red-400'
                          }`}
                        >
                          {habit.trend === 'up' ? '▲' : '▼'}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Progres Tempur Section */}
              <div className="my-6">
                <h3 className="text-md font-bold mb-3 flex items-center gap-2">
                  <span className="text-purple-400">📊</span> Progres Tempur
                </h3>
                <div className="bg-[#1e1e1e] rounded-3xl p-4 -ml-4">
                  <ResponsiveContainer width="100%" height={200}>
                    <LineChart data={dailyProgress}>
                      <XAxis dataKey="day" stroke="#6b7280" tick={{fontSize: 12}} />
                      <YAxis stroke="#6b7280" tick={{fontSize: 12}} domain={[0, 10]} />
                      <Tooltip contentStyle={{backgroundColor: '#121212', border: 'none', borderRadius: '8px'}} />
                      <Line
                        type="monotone"
                        dataKey="score"
                        stroke="#c084fc"
                        strokeWidth={3}
                        dot={{ r: 4, fill: '#c084fc' }}
                      />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Bottom Navigation */}
            <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1e1e1e]/90 backdrop-blur-md border-t border-gray-800 p-4 flex justify-around items-center z-10">
              <button className="text-gray-400 hover:text-purple-400 transition-all font-semibold text-xs flex flex-col items-center gap-1">
                <span className="text-xl">⊞</span> Dashboard
              </button>
              <button className="text-gray-400 hover:text-purple-400 transition-all font-semibold text-xs flex flex-col items-center gap-1">
                <span className="text-xl">💼</span> Wallet
              </button>
              <button className="text-purple-400 font-semibold text-xs flex flex-col items-center gap-1 drop-shadow-[0_0_8px_rgba(192,132,252,0.5)]">
                <span className="text-xl">📈</span> Growth
              </button>
              <button className="text-gray-400 hover:text-purple-400 transition-all font-semibold text-xs flex flex-col items-center gap-1">
                <span className="text-xl">•••</span> More
              </button>
            </nav>
          </div>
        );
      };

      // Menggunakan createRoot agar sesuai dengan React 18
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
